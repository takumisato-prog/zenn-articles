<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="420" fill="#F8F9FA" rx="16"/>

  <!-- タイトル -->
  <text x="400" y="44" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">従来のパソコン保存 vs Googleドライブ</text>

  <!-- 左パネル：従来のパソコン -->
  <rect x="40" y="70" width="320" height="300" fill="#FFFFFF" rx="12" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="40" y="70" width="320" height="50" fill="#6C757D" rx="12"/>
  <rect x="40" y="108" width="320" height="12" fill="#6C757D"/>
  <text x="200" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">💻 従来のパソコン保存</text>

  <!-- パソコンアイコン -->
  <rect x="140" y="140" width="120" height="80" fill="#DEE2E6" rx="8" stroke="#ADB5BD" stroke-width="2"/>
  <rect x="155" y="150" width="90" height="55" fill="#495057" rx="4"/>
  <rect x="120" y="224" width="160" height="8" fill="#CED4DA" rx="4"/>
  <rect x="170" y="232" width="60" height="6" fill="#ADB5BD" rx="3"/>

  <!-- ファイルアイコン群（ローカル） -->
  <rect x="90" y="178" width="28" height="34" fill="#74C0FC" rx="3"/>
  <text x="104" y="200" text-anchor="middle" font-size="9" fill="#FFFFFF">doc</text>
  <rect x="282" y="178" width="28" height="34" fill="#74C0FC" rx="3"/>
  <text x="296" y="200" text-anchor="middle" font-size="9" fill="#FFFFFF">xls</text>

  <!-- ローカル説明 -->
  <line x1="80" y1="260" x2="80" y2="360" stroke="#E9ECEF" stroke-width="1"/>
  <g>
    <circle cx="72" cy="274" r="5" fill="#FA5252"/>
    <text x="90" y="279" font-size="13" fill="#495057">別の端末からアクセス<tspan font-weight="bold" fill="#FA5252">できない</tspan></text>
  </g>
  <g>
    <circle cx="72" cy="304" r="5" fill="#FA5252"/>
    <text x="90" y="309" font-size="13" fill="#495057">共有に<tspan font-weight="bold" fill="#FA5252">メール添付が必要</tspan></text>
  </g>
  <g>
    <circle cx="72" cy="334" r="5" fill="#FA5252"/>
    <text x="90" y="339" font-size="13" fill="#495057">バックアップは<tspan font-weight="bold" fill="#FA5252">手動</tspan></text>
  </g>
  <g>
    <circle cx="72" cy="364" r="5" fill="#FA5252"/>
    <text x="90" y="369" font-size="13" fill="#495057">同時編集<tspan font-weight="bold" fill="#FA5252">不可</tspan></text>
  </g>

  <!-- VS -->
  <circle cx="400" cy="220" r="28" fill="#1A1A2E"/>
  <text x="400" y="228" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">VS</text>

  <!-- 右パネル：Googleドライブ -->
  <rect x="440" y="70" width="320" height="300" fill="#FFFFFF" rx="12" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="440" y="70" width="320" height="50" fill="#1971C2" rx="12"/>
  <rect x="440" y="108" width="320" height="12" fill="#1971C2"/>
  <text x="600" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">☁️ Googleドライブ</text>

  <!-- クラウドアイコン -->
  <ellipse cx="600" cy="168" rx="50" ry="30" fill="#D0EBFF"/>
  <ellipse cx="575" cy="175" rx="32" ry="22" fill="#D0EBFF"/>
  <ellipse cx="625" cy="175" rx="32" ry="22" fill="#D0EBFF"/>
  <rect x="555" y="185" width="90" height="30" fill="#D0EBFF"/>

  <!-- ファイルアイコン群（クラウド） -->
  <rect x="450" y="148" width="28" height="34" fill="#51CF66" rx="3"/>
  <text x="464" y="170" text-anchor="middle" font-size="9" fill="#FFFFFF">doc</text>
  <rect x="702" y="148" width="28" height="34" fill="#51CF66" rx="3"/>
  <text x="716" y="170" text-anchor="middle" font-size="9" fill="#FFFFFF">xls</text>

  <!-- 端末アイコン群 -->
  <text x="555" y="232" font-size="22" fill="#1971C2">📱</text>
  <text x="590" y="232" font-size="22" fill="#1971C2">💻</text>
  <text x="625" y="232" font-size="22" fill="#1971C2">🖥️</text>

  <!-- Googleドライブ説明 -->
  <line x1="450" y1="260" x2="450" y2="360" stroke="#E9ECEF" stroke-width="1"/>
  <g>
    <circle cx="442" cy="274" r="5" fill="#51CF66"/>
    <text x="460" y="279" font-size="13" fill="#495057">どの端末からでも<tspan font-weight="bold" fill="#2F9E44">アクセス可能</tspan></text>
  </g>
  <g>
    <circle cx="442" cy="304" r="5" fill="#51CF66"/>
    <text x="460" y="309" font-size="13" fill="#495057"><tspan font-weight="bold" fill="#2F9E44">リンクを送るだけ</tspan>で共有</text>
  </g>
  <g>
    <circle cx="442" cy="334" r="5" fill="#51CF66"/>
    <text x="460" y="339" font-size="13" fill="#495057">バックアップは<tspan font-weight="bold" fill="#2F9E44">自動</tspan></text>
  </g>
  <g>
    <circle cx="442" cy="364" r="5" fill="#51CF66"/>
    <text x="460" y="369" font-size="13" fill="#495057">リアルタイムで<tspan font-weight="bold" fill="#2F9E44">同時編集可能</tspan></text>
  </g>
</svg>
