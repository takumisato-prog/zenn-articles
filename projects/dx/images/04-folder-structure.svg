<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <rect width="800" height="420" fill="#F8F9FA" rx="16"/>

  <!-- タイトル -->
  <text x="400" y="44" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">おすすめフォルダ構成（中小企業向け）</text>

  <!-- メインボックス -->
  <rect x="40" y="62" width="720" height="338" fill="#FFFFFF" rx="12" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- ルートフォルダ -->
  <rect x="60" y="82" width="260" height="44" fill="#1971C2" rx="8"/>
  <text x="80" y="101" font-size="18" fill="#FFFFFF">📁</text>
  <text x="108" y="108" font-size="15" font-weight="bold" fill="#FFFFFF">会社共有ドライブ</text>

  <!-- 縦線 -->
  <line x1="88" y1="126" x2="88" y2="366" stroke="#CED4DA" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- 社内規程フォルダ -->
  <line x1="88" y1="152" x2="120" y2="152" stroke="#CED4DA" stroke-width="2"/>
  <rect x="120" y="136" width="220" height="36" fill="#D0EBFF" rx="6"/>
  <text x="138" y="150" font-size="16" fill="#1971C2">📁</text>
  <text x="162" y="158" font-size="14" fill="#1971C2">社内規程・マニュアル</text>

  <!-- 議事録フォルダ -->
  <line x1="88" y1="210" x2="120" y2="210" stroke="#CED4DA" stroke-width="2"/>
  <rect x="120" y="194" width="220" height="36" fill="#D0EBFF" rx="6"/>
  <text x="138" y="208" font-size="16" fill="#1971C2">📁</text>
  <text x="162" y="216" font-size="14" fill="#1971C2">議事録（年度別）</text>

  <!-- 議事録サブフォルダ -->
  <line x1="240" y1="230" x2="240" y2="284" stroke="#CED4DA" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="240" y1="252" x2="270" y2="252" stroke="#CED4DA" stroke-width="1.5"/>
  <rect x="270" y="238" width="120" height="28" fill="#E7F5FF" rx="5"/>
  <text x="284" y="249" font-size="13" fill="#1971C2">📁</text>
  <text x="302" y="256" font-size="12" fill="#1971C2">2025年</text>

  <line x1="240" y1="282" x2="270" y2="282" stroke="#CED4DA" stroke-width="1.5"/>
  <rect x="270" y="268" width="120" height="28" fill="#E7F5FF" rx="5"/>
  <text x="284" y="279" font-size="13" fill="#1971C2">📁</text>
  <text x="302" y="286" font-size="12" fill="#1971C2">2026年</text>

  <!-- プロジェクトフォルダ -->
  <line x1="88" y1="314" x2="120" y2="314" stroke="#CED4DA" stroke-width="2"/>
  <rect x="120" y="298" width="220" height="36" fill="#D0EBFF" rx="6"/>
  <text x="138" y="312" font-size="16" fill="#1971C2">📁</text>
  <text x="162" y="320" font-size="14" fill="#1971C2">プロジェクト別</text>

  <!-- プロジェクトサブフォルダ -->
  <line x1="240" y1="334" x2="240" y2="370" stroke="#CED4DA" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="240" y1="346" x2="270" y2="346" stroke="#CED4DA" stroke-width="1.5"/>
  <rect x="270" y="332" width="120" height="28" fill="#E7F5FF" rx="5"/>
  <text x="284" y="343" font-size="13" fill="#1971C2">📁</text>
  <text x="302" y="350" font-size="12" fill="#1971C2">〇〇案件</text>

  <line x1="240" y1="368" x2="270" y2="368" stroke="#CED4DA" stroke-width="1.5"/>
  <rect x="270" y="354" width="120" height="28" fill="#E7F5FF" rx="5"/>
  <text x="284" y="365" font-size="13" fill="#1971C2">📁</text>
  <text x="302" y="372" font-size="12" fill="#1971C2">△△案件</text>

  <!-- 請求書フォルダ -->
  <line x1="88" y1="366" x2="120" y2="366" stroke="#CED4DA" stroke-width="2"/>
  <rect x="120" y="350" width="220" height="36" fill="#D0EBFF" rx="6"/>
  <text x="138" y="364" font-size="16" fill="#1971C2">📁</text>
  <text x="162" y="372" font-size="14" fill="#1971C2">請求書・領収書</text>

  <!-- 右側ポイント -->
  <rect x="460" y="82" width="280" height="318" fill="#F8F9FA" rx="10" stroke="#E9ECEF" stroke-width="1"/>
  <text x="600" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A2E">フォルダ名のポイント</text>
  <line x1="480" y1="120" x2="720" y2="120" stroke="#E9ECEF" stroke-width="1"/>

  <g>
    <rect x="480" y="134" width="6" height="6" fill="#1971C2" rx="1"/>
    <text x="496" y="143" font-size="13" fill="#495057">年度を入れる</text>
    <text x="496" y="160" font-size="12" fill="#868E96">例: 2026年_議事録</text>
  </g>

  <g>
    <rect x="480" y="178" width="6" height="6" fill="#1971C2" rx="1"/>
    <text x="496" y="187" font-size="13" fill="#495057">案件名を具体的に</text>
    <text x="496" y="204" font-size="12" fill="#868E96">例: 〇〇社_LP制作</text>
  </g>

  <g>
    <rect x="480" y="222" width="6" height="6" fill="#1971C2" rx="1"/>
    <text x="496" y="231" font-size="13" fill="#495057">日本語でOK</text>
    <text x="496" y="248" font-size="12" fill="#868E96">Googleドライブは日本語検索も得意</text>
  </g>

  <g>
    <rect x="480" y="266" width="6" height="6" fill="#FA5252" rx="1"/>
    <text x="496" y="275" font-size="13" fill="#495057">深すぎる階層は避ける</text>
    <text x="496" y="292" font-size="12" fill="#868E96">3階層以内が目安</text>
  </g>

  <g>
    <rect x="480" y="310" width="6" height="6" fill="#FA5252" rx="1"/>
    <text x="496" y="319" font-size="13" fill="#495057">個人名フォルダは非推奨</text>
    <text x="496" y="336" font-size="12" fill="#868E96">退職時にアクセス困難になる</text>
  </g>

  <rect x="480" y="358" width="240" height="28" fill="#E7F5FF" rx="6"/>
  <text x="600" y="376" text-anchor="middle" font-size="12" font-weight="bold" fill="#1971C2">チームで構成を統一することが大切</text>
</svg>
