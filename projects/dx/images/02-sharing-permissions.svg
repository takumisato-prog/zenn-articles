<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <rect width="800" height="380" fill="#F8F9FA" rx="16"/>

  <!-- タイトル -->
  <text x="400" y="44" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">共有権限の種類と使い分け</text>

  <!-- 閲覧者カード -->
  <rect x="40" y="70" width="220" height="280" fill="#FFFFFF" rx="12" stroke="#74C0FC" stroke-width="2"/>
  <rect x="40" y="70" width="220" height="56" fill="#D0EBFF" rx="12"/>
  <rect x="40" y="114" width="220" height="12" fill="#D0EBFF"/>
  <text x="150" y="96" text-anchor="middle" font-size="28">👁️</text>
  <text x="150" y="114" text-anchor="middle" font-size="16" font-weight="bold" fill="#1971C2">閲覧者</text>

  <text x="150" y="155" text-anchor="middle" font-size="13" fill="#868E96">できること</text>
  <line x1="60" y1="162" x2="240" y2="162" stroke="#E9ECEF" stroke-width="1"/>

  <text x="70" y="188" font-size="13" fill="#2F9E44">✓ ファイルを見る</text>
  <text x="70" y="214" font-size="13" fill="#FA5252">✗ 編集する</text>
  <text x="70" y="240" font-size="13" fill="#FA5252">✗ コメントする</text>
  <text x="70" y="266" font-size="13" fill="#FA5252">✗ 削除・移動する</text>

  <line x1="60" y1="286" x2="240" y2="286" stroke="#E9ECEF" stroke-width="1"/>
  <rect x="60" y="298" width="160" height="34" fill="#D0EBFF" rx="8"/>
  <text x="140" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#1971C2">見てもらうだけのとき</text>

  <!-- コメント可カード -->
  <rect x="290" y="70" width="220" height="280" fill="#FFFFFF" rx="12" stroke="#FFD43B" stroke-width="2"/>
  <rect x="290" y="70" width="220" height="56" fill="#FFF3BF" rx="12"/>
  <rect x="290" y="114" width="220" height="12" fill="#FFF3BF"/>
  <text x="400" y="96" text-anchor="middle" font-size="28">💬</text>
  <text x="400" y="114" text-anchor="middle" font-size="16" font-weight="bold" fill="#E67700">コメント可</text>

  <text x="400" y="155" text-anchor="middle" font-size="13" fill="#868E96">できること</text>
  <line x1="310" y1="162" x2="490" y2="162" stroke="#E9ECEF" stroke-width="1"/>

  <text x="320" y="188" font-size="13" fill="#2F9E44">✓ ファイルを見る</text>
  <text x="320" y="214" font-size="13" fill="#2F9E44">✓ コメントする</text>
  <text x="320" y="240" font-size="13" fill="#FA5252">✗ 編集する</text>
  <text x="320" y="266" font-size="13" fill="#FA5252">✗ 削除・移動する</text>

  <line x1="310" y1="286" x2="490" y2="286" stroke="#E9ECEF" stroke-width="1"/>
  <rect x="310" y="298" width="160" height="34" fill="#FFF3BF" rx="8"/>
  <text x="390" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67700">レビューをお願いするとき</text>

  <!-- 編集者カード -->
  <rect x="540" y="70" width="220" height="280" fill="#FFFFFF" rx="12" stroke="#69DB7C" stroke-width="2"/>
  <rect x="540" y="70" width="220" height="56" fill="#D3F9D8" rx="12"/>
  <rect x="540" y="114" width="220" height="12" fill="#D3F9D8"/>
  <text x="650" y="96" text-anchor="middle" font-size="28">✏️</text>
  <text x="650" y="114" text-anchor="middle" font-size="16" font-weight="bold" fill="#2F9E44">編集者</text>

  <text x="650" y="155" text-anchor="middle" font-size="13" fill="#868E96">できること</text>
  <line x1="560" y1="162" x2="740" y2="162" stroke="#E9ECEF" stroke-width="1"/>

  <text x="570" y="188" font-size="13" fill="#2F9E44">✓ ファイルを見る</text>
  <text x="570" y="214" font-size="13" fill="#2F9E44">✓ コメントする</text>
  <text x="570" y="240" font-size="13" fill="#2F9E44">✓ 編集・作成する</text>
  <text x="570" y="266" font-size="13" fill="#E67700">△ 削除・移動できる</text>

  <line x1="560" y1="286" x2="740" y2="286" stroke="#E9ECEF" stroke-width="1"/>
  <rect x="560" y="298" width="160" height="34" fill="#D3F9D8" rx="8"/>
  <text x="640" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#2F9E44">一緒に作業するとき</text>

  <!-- 矢印と注意 -->
  <text x="400" y="368" text-anchor="middle" font-size="12" fill="#868E96">⚠️ 迷ったら「閲覧者」から始めて、必要に応じて権限を上げましょう</text>
</svg>
