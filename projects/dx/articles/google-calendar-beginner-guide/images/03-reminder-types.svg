<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <style>
      text { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="380" fill="#F8F9FA"/>

  <!-- タイトル -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">通知・リマインダーの種類と設定</text>

  <!-- ===== タイムライン ===== -->
  <!-- 時系列バー -->
  <rect x="60" y="78" width="680" height="8" rx="4" fill="#DADCE0"/>

  <!-- 前日マーカー -->
  <circle cx="130" cy="82" r="12" fill="#1A73E8"/>
  <text x="130" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">1</text>
  <text x="130" y="65" text-anchor="middle" font-size="11" fill="#5F6368">前日</text>

  <!-- 30分前マーカー -->
  <circle cx="450" cy="82" r="12" fill="#1A73E8"/>
  <text x="450" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">2</text>
  <text x="450" y="65" text-anchor="middle" font-size="11" fill="#5F6368">30分前</text>

  <!-- 会議マーカー -->
  <rect x="695" y="60" width="50" height="44" rx="6" fill="#EA4335"/>
  <text x="720" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">会議</text>
  <text x="720" y="94" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">開始</text>
  <line x1="720" y1="82" x2="720" y2="104" stroke="#EA4335" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- ===== 通知カード1：メール通知（前日） ===== -->
  <rect x="30" y="110" width="340" height="180" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <!-- ヘッダー -->
  <rect x="30" y="110" width="340" height="46" rx="12" fill="#1A73E8"/>
  <rect x="30" y="144" width="340" height="12" fill="#1A73E8"/>
  <!-- メールアイコン -->
  <rect x="50" y="120" width="30" height="26" rx="4" fill="#ffffff" fill-opacity="0.3"/>
  <path d="M51 121 L65 132 L79 121" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text x="100" y="130" font-size="15" font-weight="bold" fill="#ffffff">メール通知</text>
  <text x="100" y="147" font-size="11" fill="#C5D9FF">推奨：1日前</text>

  <!-- メールモックアップ -->
  <rect x="50" y="168" width="300" height="90" rx="8" fill="#F8F9FA"/>
  <text x="62" y="186" font-size="10" fill="#80868B">差出人：calendar-notification@google.com</text>
  <text x="62" y="200" font-size="10" fill="#80868B">件名：明日の予定：月次会議（10:00）</text>
  <line x1="50" y1="207" x2="350" y2="207" stroke="#DADCE0" stroke-width="1"/>
  <text x="62" y="221" font-size="11" fill="#202124" font-weight="bold">明日 月次会議があります</text>
  <text x="62" y="236" font-size="10" fill="#5F6368">日時：2026年3月20日（金）10:00〜11:00</text>
  <text x="62" y="250" font-size="10" fill="#5F6368">場所：第1会議室</text>

  <!-- 特徴タグ -->
  <rect x="50" y="272" width="120" height="20" rx="10" fill="#E8F0FE"/>
  <text x="110" y="285" text-anchor="middle" font-size="11" fill="#1A73E8">メールで受信</text>
  <rect x="180" y="272" width="170" height="20" rx="10" fill="#E8F0FE"/>
  <text x="265" y="285" text-anchor="middle" font-size="11" fill="#1A73E8">メールを確認する人向け</text>

  <!-- ===== 通知カード2：プッシュ通知（30分前） ===== -->
  <rect x="430" y="110" width="340" height="180" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <!-- ヘッダー -->
  <rect x="430" y="110" width="340" height="46" rx="12" fill="#34A853"/>
  <rect x="430" y="144" width="340" height="12" fill="#34A853"/>
  <!-- ベルアイコン -->
  <path d="M453 136 Q453 122 465 122 Q477 122 477 136 L479 142 L451 142 Z" fill="#ffffff" fill-opacity="0.3"/>
  <ellipse cx="465" cy="143" rx="4" ry="2" fill="#ffffff" fill-opacity="0.3"/>
  <text x="496" y="130" font-size="15" font-weight="bold" fill="#ffffff">プッシュ通知</text>
  <text x="496" y="147" font-size="11" fill="#A8E6BB">推奨：15〜30分前</text>

  <!-- スマホ通知モックアップ -->
  <rect x="450" y="165" width="130" height="100" rx="12" fill="#202124"/>
  <rect x="456" y="178" width="118" height="80" rx="4" fill="#1C1C1E"/>
  <!-- 通知バナー -->
  <rect x="460" y="184" width="110" height="50" rx="8" fill="#2C2C2E"/>
  <circle cx="474" cy="199" r="8" fill="#34A853"/>
  <text x="474" y="203" text-anchor="middle" font-size="8" font-weight="bold" fill="#ffffff">G</text>
  <text x="487" y="196" font-size="8" fill="#ffffff" font-weight="bold">Googleカレンダー</text>
  <text x="487" y="207" font-size="7" fill="#EBEBF5">月次会議 まもなく開始</text>
  <text x="487" y="217" font-size="7" fill="#8E8E93">30分後・第1会議室</text>
  <text x="465" y="248" font-size="8" fill="#8E8E93">通知</text>

  <!-- PCバナー -->
  <rect x="592" y="165" width="164" height="60" rx="10" fill="#3C3C3C"/>
  <rect x="598" y="170" width="152" height="50" rx="8" fill="#4A4A4A"/>
  <circle cx="614" cy="185" r="8" fill="#34A853"/>
  <text x="614" y="189" text-anchor="middle" font-size="8" font-weight="bold" fill="#ffffff">G</text>
  <text x="628" y="183" font-size="9" fill="#ffffff" font-weight="bold">Googleカレンダー</text>
  <text x="628" y="195" font-size="8" fill="#DADCE0">月次会議</text>
  <text x="628" y="207" font-size="7" fill="#9AA0A6">30分後 · 第1会議室</text>

  <!-- 特徴タグ -->
  <rect x="450" y="278" width="140" height="20" rx="10" fill="#E6F4EA"/>
  <text x="520" y="291" text-anchor="middle" font-size="11" fill="#34A853">画面にポップアップ</text>
  <rect x="600" y="278" width="155" height="20" rx="10" fill="#E6F4EA"/>
  <text x="677" y="291" text-anchor="middle" font-size="11" fill="#34A853">見逃しにくい・即気づく</text>

  <!-- ===== おすすめ設定バー ===== -->
  <rect x="30" y="310" width="740" height="48" rx="10" fill="#FFF8E1"/>
  <text x="40" y="330" font-size="13" font-weight="bold" fill="#F9AB00">★ おすすめ設定</text>
  <text x="40" y="348" font-size="12" fill="#3C4043">重要な会議には「1日前（メール）」＋「15分前（プッシュ通知）」の2段階設定が安心です</text>

  <!-- フッター -->
  <text x="400" y="372" text-anchor="middle" font-size="12" fill="#80868B">株式会社ふじサンバ DX支援部門</text>
</svg>
