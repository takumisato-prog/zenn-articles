<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <style>
      text { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A73E8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="380" fill="#F8F9FA"/>

  <!-- タイトル -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">会議招待の流れ</text>

  <!-- ===== STEP 1 ===== -->
  <rect x="30" y="60" width="150" height="200" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="30" y="60" width="150" height="40" rx="12" fill="#1A73E8"/>
  <rect x="30" y="88" width="150" height="12" fill="#1A73E8"/>
  <text x="105" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">STEP 1</text>

  <!-- カレンダーアイコン -->
  <rect x="68" y="115" width="74" height="66" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="2"/>
  <rect x="68" y="115" width="74" height="22" rx="6" fill="#1A73E8"/>
  <rect x="68" y="127" width="74" height="10" fill="#1A73E8"/>
  <line x1="89" y1="109" x2="89" y2="121" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
  <line x1="121" y1="109" x2="121" y2="121" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
  <!-- カレンダーのマス目 -->
  <rect x="76" y="144" width="12" height="10" rx="2" fill="#1A73E8"/>
  <rect x="96" y="144" width="12" height="10" rx="2" fill="#DADCE0"/>
  <rect x="116" y="144" width="12" height="10" rx="2" fill="#DADCE0"/>
  <rect x="76" y="160" width="12" height="10" rx="2" fill="#DADCE0"/>
  <rect x="96" y="160" width="12" height="10" rx="2" fill="#DADCE0"/>
  <rect x="116" y="160" width="12" height="10" rx="2" fill="#DADCE0"/>

  <text x="105" y="202" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">日付をクリック</text>
  <text x="105" y="218" text-anchor="middle" font-size="11" fill="#5F6368">予定を入れたい</text>
  <text x="105" y="232" text-anchor="middle" font-size="11" fill="#5F6368">日付を選ぶ</text>

  <!-- 矢印1 -->
  <line x1="190" y1="160" x2="225" y2="160" stroke="#1A73E8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 2 ===== -->
  <rect x="230" y="60" width="150" height="200" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="230" y="60" width="150" height="40" rx="12" fill="#1A73E8"/>
  <rect x="230" y="88" width="150" height="12" fill="#1A73E8"/>
  <text x="305" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">STEP 2</text>

  <!-- テキスト入力アイコン -->
  <rect x="260" y="112" width="90" height="36" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="268" y="128" font-size="10" fill="#5F6368">タイトルを追加</text>
  <line x1="261" y1="140" x2="349" y2="140" stroke="#1A73E8" stroke-width="1.5"/>

  <!-- メールアイコン -->
  <rect x="260" y="154" width="90" height="52" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="268" y="168" font-size="9" fill="#5F6368">参加者を追加</text>
  <text x="268" y="182" font-size="10" fill="#1A73E8">tanaka@fujisamba</text>
  <text x="268" y="196" font-size="10" fill="#1A73E8">sato@fujisamba</text>

  <text x="305" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">参加者を入力</text>
  <text x="305" y="242" text-anchor="middle" font-size="11" fill="#5F6368">メールアドレスで</text>
  <text x="305" y="256" text-anchor="middle" font-size="11" fill="#5F6368">招待者を追加</text>

  <!-- 矢印2 -->
  <line x1="390" y1="160" x2="425" y2="160" stroke="#1A73E8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 3 ===== -->
  <rect x="430" y="60" width="150" height="200" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="430" y="60" width="150" height="40" rx="12" fill="#1A73E8"/>
  <rect x="430" y="88" width="150" height="12" fill="#1A73E8"/>
  <text x="505" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">STEP 3</text>

  <!-- 送信ボタン -->
  <rect x="458" y="112" width="94" height="36" rx="18" fill="#1A73E8"/>
  <text x="505" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">招待状を送信</text>

  <!-- メール飛ぶアイコン -->
  <path d="M468 165 L542 165 L542 205 L468 205 Z" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <path d="M468 165 L505 188 L542 165" fill="none" stroke="#1A73E8" stroke-width="1.5"/>
  <!-- 送信矢印 -->
  <line x1="555" y1="185" x2="575" y2="185" stroke="#34A853" stroke-width="2" marker-end="url(#arrow-green)"/>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/>
    </marker>
  </defs>

  <text x="505" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">保存して送信</text>
  <text x="505" y="242" text-anchor="middle" font-size="11" fill="#5F6368">参加者全員に</text>
  <text x="505" y="256" text-anchor="middle" font-size="11" fill="#5F6368">メールが届く</text>

  <!-- 矢印3 -->
  <line x1="590" y1="160" x2="625" y2="160" stroke="#34A853" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- ===== STEP 4（相手側） ===== -->
  <rect x="630" y="60" width="140" height="200" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="630" y="60" width="140" height="40" rx="12" fill="#34A853"/>
  <rect x="630" y="88" width="140" height="12" fill="#34A853"/>
  <text x="700" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">相手が返答</text>

  <!-- 3択ボタン -->
  <rect x="648" y="112" width="104" height="30" rx="8" fill="#34A853"/>
  <text x="700" y="131" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">✓ 承認</text>

  <rect x="648" y="150" width="104" height="30" rx="8" fill="#EA4335"/>
  <text x="700" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">✗ 辞退</text>

  <rect x="648" y="188" width="104" height="30" rx="8" fill="#F9AB00"/>
  <text x="700" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">? 未定</text>

  <text x="700" y="234" text-anchor="middle" font-size="11" fill="#5F6368">ワンクリックで</text>
  <text x="700" y="248" text-anchor="middle" font-size="11" fill="#5F6368">出欠を返答</text>

  <!-- 下部の説明バー -->
  <rect x="30" y="278" width="740" height="60" rx="10" fill="#E8F0FE"/>
  <text x="400" y="302" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A73E8">承認した参加者のカレンダーには自動で予定が追加されます</text>
  <text x="400" y="324" text-anchor="middle" font-size="12" fill="#3C4043">主催者は誰が承認・辞退したかをいつでも確認できます</text>

  <!-- フッター -->
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#80868B">株式会社ふじサンバ DX支援部門</text>
</svg>
