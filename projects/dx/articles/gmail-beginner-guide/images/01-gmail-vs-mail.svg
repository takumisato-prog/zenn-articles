<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#F8F9FA" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#202124">Gmailとほかのメールソフトはどこが違う？</text>

  <!-- Gmail列ヘッダー -->
  <rect x="40" y="60" width="340" height="52" rx="8" fill="#EA4335"/>
  <text x="57" y="80" font-size="13" fill="white">📧</text>
  <text x="75" y="80" font-size="15" font-weight="bold" fill="white">Gmail</text>
  <text x="75" y="100" font-size="12" fill="#FFCDD2">（Google）</text>

  <!-- 従来メール列ヘッダー -->
  <rect x="420" y="60" width="340" height="52" rx="8" fill="#5F6368"/>
  <text x="437" y="80" font-size="13" fill="white">📬</text>
  <text x="455" y="80" font-size="15" font-weight="bold" fill="white">従来のメールソフト</text>
  <text x="455" y="100" font-size="12" fill="#E0E0E0">（Outlook など）</text>

  <!-- 行データ -->
  <!-- 行1: 使える場所 -->
  <rect x="40" y="124" width="340" height="44" rx="6" fill="white"/>
  <rect x="420" y="124" width="340" height="44" rx="6" fill="white"/>
  <text x="57" y="141" font-size="11" fill="#5F6368" font-weight="bold">📍 使える場所</text>
  <text x="57" y="158" font-size="12" fill="#34A853" font-weight="bold">ブラウザ・スマホ・タブレット ✓</text>
  <text x="437" y="141" font-size="11" fill="#5F6368" font-weight="bold">📍 使える場所</text>
  <text x="437" y="158" font-size="12" fill="#9E9E9E">主にPC（インストール必要）</text>

  <!-- 行2: ストレージ -->
  <rect x="40" y="178" width="340" height="44" rx="6" fill="#F8F9FA"/>
  <rect x="420" y="178" width="340" height="44" rx="6" fill="#F8F9FA"/>
  <text x="57" y="195" font-size="11" fill="#5F6368" font-weight="bold">💾 ストレージ</text>
  <text x="57" y="212" font-size="12" fill="#34A853" font-weight="bold">15GB（無料）✓</text>
  <text x="437" y="195" font-size="11" fill="#5F6368" font-weight="bold">💾 ストレージ</text>
  <text x="437" y="212" font-size="12" fill="#9E9E9E">端末の容量に依存</text>

  <!-- 行3: 検索 -->
  <rect x="40" y="232" width="340" height="44" rx="6" fill="white"/>
  <rect x="420" y="232" width="340" height="44" rx="6" fill="white"/>
  <text x="57" y="249" font-size="11" fill="#5F6368" font-weight="bold">🔍 検索機能</text>
  <text x="57" y="266" font-size="12" fill="#34A853" font-weight="bold">Google検索と同レベルの高精度 ✓</text>
  <text x="437" y="249" font-size="11" fill="#5F6368" font-weight="bold">🔍 検索機能</text>
  <text x="437" y="266" font-size="12" fill="#9E9E9E">限定的・遅い場合あり</text>

  <!-- 行4: スレッド表示 -->
  <rect x="40" y="286" width="340" height="44" rx="6" fill="#F8F9FA"/>
  <rect x="420" y="286" width="340" height="44" rx="6" fill="#F8F9FA"/>
  <text x="57" y="303" font-size="11" fill="#5F6368" font-weight="bold">💬 スレッド表示</text>
  <text x="57" y="320" font-size="12" fill="#34A853" font-weight="bold">会話を1束にまとめて表示 ✓</text>
  <text x="437" y="303" font-size="11" fill="#5F6368" font-weight="bold">💬 スレッド表示</text>
  <text x="437" y="320" font-size="12" fill="#9E9E9E">バラバラに表示される</text>

  <!-- 行5: 自動振り分け -->
  <rect x="40" y="340" width="340" height="44" rx="6" fill="white"/>
  <rect x="420" y="340" width="340" height="44" rx="6" fill="white"/>
  <text x="57" y="357" font-size="11" fill="#5F6368" font-weight="bold">⚙️ 自動振り分け</text>
  <text x="57" y="374" font-size="12" fill="#34A853" font-weight="bold">フィルターで完全自動化 ✓</text>
  <text x="437" y="357" font-size="11" fill="#5F6368" font-weight="bold">⚙️ 自動振り分け</text>
  <text x="437" y="374" font-size="12" fill="#9E9E9E">設定が複雑・限定的</text>

  <!-- 中央区切り線 -->
  <line x1="395" y1="60" x2="395" y2="390" stroke="#DADCE0" stroke-width="2" stroke-dasharray="4,4"/>
</svg>
