<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#F8F9FA" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#202124">フィルター設定フロー：条件に合うメールを自動処理</text>

  <!-- STEP1: メール受信 -->
  <rect x="30" y="60" width="140" height="64" rx="10" fill="#EA4335"/>
  <text x="100" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="white">STEP 1</text>
  <text x="100" y="102" text-anchor="middle" font-size="12" fill="white">メール受信</text>
  <text x="100" y="116" text-anchor="middle" font-size="10" fill="#FFCDD2">📧 新着メール到着</text>

  <!-- 矢印1 -->
  <line x1="170" y1="92" x2="205" y2="92" stroke="#DADCE0" stroke-width="2"/>
  <polygon points="203,86 215,92 203,98" fill="#DADCE0"/>

  <!-- STEP2: 条件チェック -->
  <rect x="215" y="60" width="160" height="64" rx="10" fill="#FBBC04"/>
  <text x="295" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="white">STEP 2</text>
  <text x="295" y="102" text-anchor="middle" font-size="12" fill="white">条件チェック</text>
  <text x="295" y="116" text-anchor="middle" font-size="10" fill="#FFF8E1">⚙️ フィルター照合</text>

  <!-- 矢印2 -->
  <line x1="375" y1="92" x2="410" y2="92" stroke="#DADCE0" stroke-width="2"/>
  <polygon points="408,86 420,92 408,98" fill="#DADCE0"/>

  <!-- 条件に一致？ダイヤモンド -->
  <polygon points="505,60 595,92 505,124 415,92" fill="#4285F4"/>
  <text x="505" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">条件に</text>
  <text x="505" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="white">一致？</text>

  <!-- YES矢印（右） -->
  <line x1="595" y1="92" x2="635" y2="92" stroke="#34A853" stroke-width="2"/>
  <polygon points="633,86 645,92 633,98" fill="#34A853"/>
  <text x="614" y="82" text-anchor="middle" font-size="11" fill="#34A853" font-weight="bold">YES</text>

  <!-- NO矢印（下） -->
  <line x1="505" y1="124" x2="505" y2="160" stroke="#EA4335" stroke-width="2"/>
  <polygon points="499,158 511,158 505,170" fill="#EA4335"/>
  <text x="520" y="148" font-size="11" fill="#EA4335" font-weight="bold">NO</text>

  <!-- STEP3: 自動アクション -->
  <rect x="645" y="60" width="135" height="64" rx="10" fill="#34A853"/>
  <text x="712" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="white">STEP 3</text>
  <text x="712" y="102" text-anchor="middle" font-size="12" fill="white">自動アクション</text>
  <text x="712" y="116" text-anchor="middle" font-size="10" fill="#C8E6C9">✅ 処理を実行</text>

  <!-- 通常受信トレイへ -->
  <rect x="420" y="170" width="170" height="40" rx="8" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
  <text x="505" y="195" text-anchor="middle" font-size="12" fill="#3949AB">通常の受信トレイへ</text>

  <!-- 自動アクション詳細（4つ） -->
  <rect x="645" y="148" width="135" height="36" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <text x="712" y="163" text-anchor="middle" font-size="11" fill="#2E7D32">🏷 ラベルを付ける</text>
  <text x="712" y="178" text-anchor="middle" font-size="10" fill="#388E3C">（例：取引先A）</text>

  <rect x="645" y="196" width="135" height="36" rx="8" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
  <text x="712" y="211" text-anchor="middle" font-size="11" fill="#E65100">📂 受信トレイを</text>
  <text x="712" y="226" text-anchor="middle" font-size="10" fill="#BF360C">スキップ（アーカイブ）</text>

  <rect x="645" y="244" width="135" height="36" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="712" y="259" text-anchor="middle" font-size="11" fill="#1565C0">✔️ 既読にする</text>
  <text x="712" y="274" text-anchor="middle" font-size="10" fill="#1976D2">（未読バッジを消す）</text>

  <rect x="645" y="292" width="135" height="36" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
  <text x="712" y="307" text-anchor="middle" font-size="11" fill="#880E4F">⭐ スターを付ける</text>
  <text x="712" y="322" text-anchor="middle" font-size="10" fill="#C2185B">（重要メールに）</text>

  <!-- 条件設定の補足ボックス -->
  <rect x="30" y="160" width="360" height="220" rx="10" fill="white" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="210" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#202124">設定できる条件の例</text>
  <line x1="50" y1="190" x2="370" y2="190" stroke="#DADCE0" stroke-width="1"/>

  <!-- 条件リスト -->
  <rect x="50" y="200" width="320" height="32" rx="6" fill="#F8F9FA"/>
  <text x="65" y="218" font-size="11" fill="#5F6368" font-weight="bold">送信者（From）：</text>
  <text x="175" y="218" font-size="11" fill="#EA4335">newsletter@example.com</text>

  <rect x="50" y="238" width="320" height="32" rx="6" fill="white"/>
  <text x="65" y="256" font-size="11" fill="#5F6368" font-weight="bold">件名に含む：</text>
  <text x="175" y="256" font-size="11" fill="#EA4335">【重要】/ 請求書 / 〇〇の件</text>

  <rect x="50" y="276" width="320" height="32" rx="6" fill="#F8F9FA"/>
  <text x="65" y="294" font-size="11" fill="#5F6368" font-weight="bold">受信者（To）：</text>
  <text x="175" y="294" font-size="11" fill="#EA4335">info@fujisamba.co.jp</text>

  <rect x="50" y="314" width="320" height="32" rx="6" fill="white"/>
  <text x="65" y="332" font-size="11" fill="#5F6368" font-weight="bold">添付ファイルあり：</text>
  <text x="185" y="332" font-size="11" fill="#EA4335">has:attachment を使う</text>

  <rect x="50" y="352" width="320" height="20" rx="4" fill="#FFF8E1"/>
  <text x="210" y="365" text-anchor="middle" font-size="10" fill="#F57C00">複数条件を AND / OR で組み合わせられます</text>
</svg>
