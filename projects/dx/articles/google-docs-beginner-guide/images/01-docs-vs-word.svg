<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#F8F9FA" rx="12"/>

  <!-- タイトル -->
  <rect x="0" y="0" width="800" height="56" fill="#4285F4" rx="12"/>
  <rect x="0" y="44" width="800" height="12" fill="#4285F4"/>
  <text x="400" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="bold">GoogleドキュメントとWordの違い</text>

  <!-- Wordカラム背景 -->
  <rect x="24" y="76" width="350" height="304" fill="white" rx="10" stroke="#E0E0E0" stroke-width="1.5"/>
  <!-- Googleドキュメントカラム背景 -->
  <rect x="426" y="76" width="350" height="304" fill="white" rx="10" stroke="#4285F4" stroke-width="2"/>

  <!-- Wordヘッダー -->
  <rect x="24" y="76" width="350" height="50" fill="#2B579A" rx="10"/>
  <rect x="24" y="114" width="350" height="12" fill="#2B579A"/>
  <text x="199" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Microsoft Word</text>

  <!-- Googleドキュメントヘッダー -->
  <rect x="426" y="76" width="350" height="50" fill="#4285F4" rx="10"/>
  <rect x="426" y="114" width="350" height="12" fill="#4285F4"/>
  <text x="601" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Googleドキュメント</text>

  <!-- VS バッジ -->
  <circle cx="400" cy="150" r="22" fill="#F8F9FA" stroke="#BDBDBD" stroke-width="2"/>
  <text x="400" y="156" text-anchor="middle" fill="#616161" font-size="14" font-weight="bold">VS</text>

  <!-- 比較行1: 料金 -->
  <text x="64" y="160" fill="#9E9E9E" font-size="11">料金</text>
  <text x="64" y="179" fill="#212121" font-size="13" font-weight="bold">有料（Microsoft 365）</text>
  <text x="466" y="160" fill="#9E9E9E" font-size="11">料金</text>
  <text x="466" y="179" fill="#34A853" font-size="13" font-weight="bold">無料で使える</text>

  <!-- 区切り線 -->
  <line x1="40" y1="193" x2="358" y2="193" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="442" y1="193" x2="760" y2="193" stroke="#E8F0FE" stroke-width="1"/>

  <!-- 比較行2: 保存 -->
  <text x="64" y="213" fill="#9E9E9E" font-size="11">保存方法</text>
  <text x="64" y="232" fill="#212121" font-size="13">手動で「上書き保存」が必要</text>
  <text x="466" y="213" fill="#9E9E9E" font-size="11">保存方法</text>
  <text x="466" y="232" fill="#34A853" font-size="13" font-weight="bold">自動保存（操作不要）</text>

  <!-- 区切り線 -->
  <line x1="40" y1="246" x2="358" y2="246" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="442" y1="246" x2="760" y2="246" stroke="#E8F0FE" stroke-width="1"/>

  <!-- 比較行3: 同時編集 -->
  <text x="64" y="266" fill="#9E9E9E" font-size="11">複数人での同時編集</text>
  <text x="64" y="285" fill="#F44336" font-size="13">難しい・制限がある</text>
  <text x="466" y="266" fill="#9E9E9E" font-size="11">複数人での同時編集</text>
  <text x="466" y="285" fill="#34A853" font-size="13" font-weight="bold">リアルタイムで同時編集可能</text>

  <!-- 区切り線 -->
  <line x1="40" y1="299" x2="358" y2="299" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="442" y1="299" x2="760" y2="299" stroke="#E8F0FE" stroke-width="1"/>

  <!-- 比較行4: バージョン -->
  <text x="64" y="319" fill="#9E9E9E" font-size="11">変更履歴の管理</text>
  <text x="64" y="338" fill="#F44336" font-size="13">手動でファイルを複製</text>
  <text x="466" y="319" fill="#9E9E9E" font-size="11">変更履歴の管理</text>
  <text x="466" y="338" fill="#34A853" font-size="13" font-weight="bold">自動でバージョン履歴を保存</text>

  <!-- 区切り線 -->
  <line x1="40" y1="352" x2="358" y2="352" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="442" y1="352" x2="760" y2="352" stroke="#E8F0FE" stroke-width="1"/>

  <!-- 比較行5: アクセス -->
  <text x="64" y="372" fill="#9E9E9E" font-size="11">別の端末からのアクセス</text>
  <text x="64" y="389" fill="#F44336" font-size="13">設定・準備が必要</text>
  <text x="466" y="372" fill="#9E9E9E" font-size="11">別の端末からのアクセス</text>
  <text x="466" y="389" fill="#34A853" font-size="13" font-weight="bold">どこからでも即アクセス</text>
</svg>
