<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <style>
      text { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="380" fill="#F8F9FA" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">Google Chat スペースの構造と使い方</text>

  <!-- ===== スペース全体の外枠 ===== -->
  <rect x="30" y="62" width="740" height="290" rx="12" fill="#ffffff" stroke="#1A73E8" stroke-width="2"/>

  <!-- スペース名ヘッダー -->
  <rect x="30" y="62" width="740" height="48" rx="12" fill="#1A73E8"/>
  <rect x="30" y="90" width="740" height="20" fill="#1A73E8"/>
  <!-- ハッシュアイコン -->
  <text x="60" y="93" font-size="22" font-weight="bold" fill="#ffffff">#</text>
  <text x="84" y="93" font-size="17" font-weight="bold" fill="#ffffff">営業チーム全体スペース</text>

  <!-- メンバーアイコン群（右上） -->
  <circle cx="650" cy="86" r="14" fill="#E8F0FE" stroke="#ffffff" stroke-width="2"/>
  <text x="650" y="91" text-anchor="middle" font-size="12" fill="#1A73E8">田</text>
  <circle cx="672" cy="86" r="14" fill="#FCE8E6" stroke="#ffffff" stroke-width="2"/>
  <text x="672" y="91" text-anchor="middle" font-size="12" fill="#EA4335">山</text>
  <circle cx="694" cy="86" r="14" fill="#E6F4EA" stroke="#ffffff" stroke-width="2"/>
  <text x="694" y="91" text-anchor="middle" font-size="12" fill="#34A853">佐</text>
  <circle cx="716" cy="86" r="14" fill="#FEF3E2" stroke="#ffffff" stroke-width="2"/>
  <text x="716" y="91" text-anchor="middle" font-size="12" fill="#F29900">中</text>
  <text x="748" y="91" font-size="12" fill="#ffffff">+8</text>

  <!-- ===== スレッド1 ===== -->
  <rect x="50" y="126" width="700" height="70" rx="8" fill="#F8F9FA" stroke="#E8EAED" stroke-width="1"/>

  <!-- スレッドアイコン -->
  <rect x="66" y="138" width="36" height="28" rx="6" fill="#1A73E8" opacity="0.15"/>
  <text x="84" y="157" text-anchor="middle" font-size="17" fill="#1A73E8">💬</text>

  <text x="114" y="148" font-size="13" font-weight="bold" fill="#202124">4月の勉強会について</text>
  <text x="114" y="165" font-size="12" fill="#5F6368">田中さん：来週の勉強会の日程ですが、4月15日（火）14時〜はいかがでしょうか？</text>
  <text x="114" y="182" font-size="11" fill="#9AA0A6">返信 3件　　昨日 14:32</text>

  <!-- スレッド1の返信数バッジ -->
  <rect x="676" y="138" width="58" height="22" rx="11" fill="#E8F0FE"/>
  <text x="705" y="153" text-anchor="middle" font-size="11" fill="#1A73E8">返信 3件</text>

  <!-- ===== スレッド2 ===== -->
  <rect x="50" y="208" width="700" height="70" rx="8" fill="#F8F9FA" stroke="#E8EAED" stroke-width="1"/>

  <rect x="66" y="220" width="36" height="28" rx="6" fill="#34A853" opacity="0.15"/>
  <text x="84" y="239" text-anchor="middle" font-size="17" fill="#34A853">📋</text>

  <text x="114" y="230" font-size="13" font-weight="bold" fill="#202124">備品の発注依頼</text>
  <text x="114" y="247" font-size="12" fill="#5F6368">山田さん：コピー用紙がなくなりそうです。A4用紙×5箱を発注お願いします。</text>
  <text x="114" y="264" font-size="11" fill="#9AA0A6">返信 1件　　今日 09:15</text>

  <rect x="676" y="220" width="58" height="22" rx="11" fill="#E6F4EA"/>
  <text x="705" y="235" text-anchor="middle" font-size="11" fill="#34A853">返信 1件</text>

  <!-- ===== スレッド3（新規） ===== -->
  <rect x="50" y="290" width="700" height="50" rx="8" fill="#ffffff" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="6,3"/>

  <text x="84" y="313" text-anchor="middle" font-size="17" fill="#9AA0A6">+</text>
  <text x="110" y="313" font-size="13" fill="#9AA0A6">新しいスレッドを開始する...</text>

  <!-- ===== 右側の注釈 ===== -->
  <!-- 注釈1 -->
  <line x1="734" y1="161" x2="760" y2="161" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- 注釈2 -->
  <line x1="734" y1="243" x2="760" y2="243" stroke="#34A853" stroke-width="1.5" stroke-dasharray="3,2"/>
</svg>
