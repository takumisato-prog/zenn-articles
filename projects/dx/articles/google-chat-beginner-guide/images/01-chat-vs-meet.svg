<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      text { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#F8F9FA" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="44" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">Google Chat と Google Meet の使い分け</text>

  <!-- ===== 左パネル: Google Chat ===== -->
  <rect x="30" y="68" width="340" height="306" rx="12" fill="#ffffff" stroke="#1A73E8" stroke-width="2"/>

  <!-- Chat ヘッダー -->
  <rect x="30" y="68" width="340" height="56" rx="12" fill="#1A73E8"/>
  <rect x="30" y="100" width="340" height="24" fill="#1A73E8"/>
  <!-- チャットアイコン -->
  <rect x="56" y="80" width="32" height="26" rx="6" fill="#ffffff" opacity="0.3"/>
  <rect x="56" y="80" width="32" height="26" rx="6" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="66" cy="93" r="2.5" fill="#ffffff"/>
  <circle cx="72" cy="93" r="2.5" fill="#ffffff"/>
  <circle cx="78" cy="93" r="2.5" fill="#ffffff"/>
  <text x="102" y="99" font-size="18" font-weight="bold" fill="#ffffff">Google Chat</text>

  <!-- Chat 特徴リスト -->
  <text x="58" y="148" font-size="13" font-weight="bold" fill="#1A73E8">向いている場面</text>

  <!-- アイテム1 -->
  <circle cx="58" cy="174" r="8" fill="#1A73E8"/>
  <text x="58" y="178" text-anchor="middle" font-size="10" fill="#ffffff">1</text>
  <text x="76" y="179" font-size="13" fill="#333333">短い確認・連絡</text>
  <text x="76" y="196" font-size="11" fill="#666666">「〇〇の件、よろしくお願いします」</text>

  <!-- アイテム2 -->
  <circle cx="58" cy="218" r="8" fill="#1A73E8"/>
  <text x="58" y="222" text-anchor="middle" font-size="10" fill="#ffffff">2</text>
  <text x="76" y="223" font-size="13" fill="#333333">ファイル・リンクの共有</text>
  <text x="76" y="240" font-size="11" fill="#666666">ドキュメントをさっと送りたいとき</text>

  <!-- アイテム3 -->
  <circle cx="58" cy="262" r="8" fill="#1A73E8"/>
  <text x="58" y="266" text-anchor="middle" font-size="10" fill="#ffffff">3</text>
  <text x="76" y="267" font-size="13" fill="#333333">複数人への情報共有</text>
  <text x="76" y="284" font-size="11" fill="#666666">チーム全体へのお知らせ・周知</text>

  <!-- アイテム4 -->
  <circle cx="58" cy="306" r="8" fill="#1A73E8"/>
  <text x="58" y="310" text-anchor="middle" font-size="10" fill="#ffffff">4</text>
  <text x="76" y="311" font-size="13" fill="#333333">急ぎでないが今日中に返信がほしい</text>
  <text x="76" y="328" font-size="11" fill="#666666">メールより返信が早く来やすい</text>

  <!-- Chat キーワードタグ -->
  <rect x="56" y="342" width="72" height="22" rx="11" fill="#E8F0FE"/>
  <text x="92" y="357" text-anchor="middle" font-size="11" fill="#1A73E8">テキスト</text>
  <rect x="138" y="342" width="72" height="22" rx="11" fill="#E8F0FE"/>
  <text x="174" y="357" text-anchor="middle" font-size="11" fill="#1A73E8">非同期OK</text>
  <rect x="220" y="342" width="72" height="22" rx="11" fill="#E8F0FE"/>
  <text x="256" y="357" text-anchor="middle" font-size="11" fill="#1A73E8">記録が残る</text>

  <!-- ===== 中央の VS ===== -->
  <circle cx="400" cy="222" r="32" fill="#ffffff" stroke="#DADCE0" stroke-width="2"/>
  <text x="400" y="229" text-anchor="middle" font-size="20" font-weight="bold" fill="#5F6368">VS</text>

  <!-- ===== 右パネル: Google Meet ===== -->
  <rect x="430" y="68" width="340" height="306" rx="12" fill="#ffffff" stroke="#34A853" stroke-width="2"/>

  <!-- Meet ヘッダー -->
  <rect x="430" y="68" width="340" height="56" rx="12" fill="#34A853"/>
  <rect x="430" y="100" width="340" height="24" fill="#34A853"/>
  <!-- ビデオアイコン -->
  <rect x="456" y="80" width="28" height="20" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="484,83 494,90 484,97" fill="#ffffff"/>
  <text x="506" y="99" font-size="18" font-weight="bold" fill="#ffffff">Google Meet</text>

  <!-- Meet 特徴リスト -->
  <text x="458" y="148" font-size="13" font-weight="bold" fill="#34A853">向いている場面</text>

  <!-- アイテム1 -->
  <circle cx="458" cy="174" r="8" fill="#34A853"/>
  <text x="458" y="178" text-anchor="middle" font-size="10" fill="#ffffff">1</text>
  <text x="476" y="179" font-size="13" fill="#333333">複雑な内容を説明したいとき</text>
  <text x="476" y="196" font-size="11" fill="#666666">声のトーン・表情が伝わる</text>

  <!-- アイテム2 -->
  <circle cx="458" cy="218" r="8" fill="#34A853"/>
  <text x="458" y="222" text-anchor="middle" font-size="10" fill="#ffffff">2</text>
  <text x="476" y="223" font-size="13" fill="#333333">複数人で議論・意思決定</text>
  <text x="476" y="240" font-size="11" fill="#666666">リアルタイムで全員の反応を確認</text>

  <!-- アイテム3 -->
  <circle cx="458" cy="262" r="8" fill="#34A853"/>
  <text x="458" y="266" text-anchor="middle" font-size="10" fill="#ffffff">3</text>
  <text x="476" y="267" font-size="13" fill="#333333">画面を共有しながら作業を見せる</text>
  <text x="476" y="284" font-size="11" fill="#666666">操作説明・デモ・レビューに最適</text>

  <!-- アイテム4 -->
  <circle cx="458" cy="306" r="8" fill="#34A853"/>
  <text x="458" y="310" text-anchor="middle" font-size="10" fill="#ffffff">4</text>
  <text x="476" y="311" font-size="13" fill="#333333">相手の反応を見ながら話したい</text>
  <text x="476" y="328" font-size="11" fill="#666666">デリケートな話題・重要な報告など</text>

  <!-- Meet キーワードタグ -->
  <rect x="456" y="342" width="72" height="22" rx="11" fill="#E6F4EA"/>
  <text x="492" y="357" text-anchor="middle" font-size="11" fill="#34A853">ビデオ通話</text>
  <rect x="538" y="342" width="72" height="22" rx="11" fill="#E6F4EA"/>
  <text x="574" y="357" text-anchor="middle" font-size="11" fill="#34A853">リアルタイム</text>
  <rect x="620" y="342" width="72" height="22" rx="11" fill="#E6F4EA"/>
  <text x="656" y="357" text-anchor="middle" font-size="11" fill="#34A853">画面共有</text>

  <!-- 下部の覚え方 -->
  <rect x="30" y="384" width="740" height="0" rx="0" fill="none"/>
</svg>
